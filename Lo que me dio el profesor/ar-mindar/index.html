<html>

<head>
  <meta name="viewport" content="width=device-width,user-scalable=no, initial-scale=0.4,maximum-scale=1" />
 
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
  <style>  
    button {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px; 
      height: 250px; 
      background-color: black;
      color: white;
      border-radius: 50%; 
      font-size: 30px;
      text-align: center;
      line-height: 150px; 
      z-index: 10;
      border: none; 
      cursor: pointer;
    }
    .a-enter-vr-button {
      display: none !important;
  }
  .a-enter-ar-button {
    display: none !important;
}
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const playButton = document.getElementById('playButton');
      const video = document.getElementById('alpha');
      const sceneEl = document.querySelector('a-scene');

      // Start AR and video after an explicit user gesture (fixes autoplay and policy errors)
      playButton.addEventListener('click', async () => {
        playButton.style.display = 'none';
        try {
          await video.play();
          video.muted = false;
        } catch (e) {
          console.warn('Video play failed:', e);
        }

        // Start mindar system when available
        if (sceneEl && sceneEl.systems && sceneEl.systems['mindar-image-system']) {
          sceneEl.systems['mindar-image-system'].start();
        } else if (sceneEl) {
          sceneEl.addEventListener('renderstart', () => {
            if (sceneEl.systems && sceneEl.systems['mindar-image-system']) {
              sceneEl.systems['mindar-image-system'].start();
            }
          }, { once: true });
        }
      });

      // Attach target found/lost handlers when marker entity is ready
      const marker = document.getElementById('marker');
      if (marker) {
        marker.addEventListener('targetFound', () => {
          console.log('target found');
          video.play();
          video.muted = false;
        });
        marker.addEventListener('targetLost', () => {
          console.log('target lost');
          video.pause();
          video.muted = true;
        });
      }

    });
    function apagado(){
      const v = document.getElementById('alpha');
      if (v) { v.pause(); v.muted = true; }
    }
  </script>
  
</head>  
  <body>
  
  <button id="playButton">Iniciar</button>

  <a-scene id="target" mindar-image="imageTargetSrc:Mark/targets.mind;filterMinCF: 0.0001;" embedded
    renderer="colorManagement: true, physicallyCorrectLights, logarithmicDepthBuffer: true;" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false" color-space="sRGB">
    <a-assets>
      <video src="asset.mp4" id="alpha" response-type="arraybuffer" crossorigin
        renderer="logarithmicDepthBuffer: true;" playsinline></video>
    </a-assets>
      <a-entity>
      <a-camera position="0 0 0" scale="0.20 0.20 0.20" look-controls="enabled: false"></a-camera>
      <a-entity id="marker" mindar-image-target="targetIndex: 0">
        <a-plane material="shader: chromakey; src: #alpha; color: 0.1 0.9 0.2" position="0 0 0"
          scale="2 4 2"></a-plane>
      </a-entity>
    </a-entity>
  </a-scene>
  
</body>
</html>
