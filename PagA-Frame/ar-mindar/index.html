<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>AR Sin Marcador</title>
    <!-- para moviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- importamos aframe y extras para animaciones -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <!-- importamos los estilos externos -->
    <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>
    <div id="ui-container">
        <!-- menú de selección -->
        <div id="selection-menu" class="menu-container">
            <h3>Elige tu modelo:</h3>
            <div class="options-grid">
                <button class="option-button" id="btn-alanis"
                    data-glb="./assets/GLB/CastilloAlanisBAKE.glb"
                    data-usdz="./assets/USDZ/CastilloAlanisBAKE.usdz"
                    data-scale="1 1 1">Castillo Alanís</button>
                <button class="option-button" id="btn-constantina"
                    data-glb="./assets/GLB/CastilloConstantinaBAKE.glb"
                    data-usdz="./assets/USDZ/CastilloConstantinaBAKE.usdz"
                    data-scale="1 1 1">Castillo Constantina</button>
                <button class="option-button" id="btn-victoria"
                    data-glb="./assets/GLB/TorreVictoriaBAKE.glb"
                    data-usdz="./assets/USDZ/TorreVictoriaBAKE.usdz"
                    data-scale="1 1 1">Torre Victoria</button>
                <button class="option-button" id="btn-equipacion"
                    data-glb="./assets/GLB/Equipacion.glb"
                    data-usdz="./assets/USDZ/Equipacion.usdz"
                    data-scale="1 1 1">Equipación</button>
            </div>

            <div class="test-container">
                <button class="option-button btn-test" id="btn-animado"
                    data-glb="./assets/GLB/Fox.glb"
                    data-usdz="./assets/USDZ/toy_drummer.usdz"
                    data-scale="0.02 0.02 0.02">Prueba Animación</button>
            </div>
        </div>

        <!-- texto que va cambiando -->
        <div id="instruction">Mueve el móvil despacio para encontrar el suelo</div>

        <!-- texto de carga -->
        <div id="loading-text">Cargando...</div>

        <!-- botón para quitar el modelo y volver a colocar otro -->
        <button id="reset-button">Reiniciar</button>

        <!-- oculto hasta que se elija una opción -->
        <button id="ar-button" style="display: none;">Ver en AR</button>
    </div>

    <!-- enlace invisible para iphone (usdz) -->
    <a id="enlace-ios" rel="ar" href="#" style="display: none;">
        <img src="" alt="AR">
    </a>

    <!-- importamos nuestro script -->
    <script src="./src/js/app.js"></script>

    <!-- configuramos webxr para q pida el hit-test y superponga el div de los botones, además traducimos la ventana de permisos al español -->
    <a-scene webxr="requiredFeatures: hit-test, local; optionalFeatures: dom-overlay; overlayElement: #ui-container"
        xr-mode-ui="enabled: false"
        background="color: transparent; transparent: true"
        device-orientation-permission-ui="allowButtonText: Permitir; denyButtonText: Denegar; cancelButtonText: Cancelar; deviceMotionMessage: Esta experiencia necesita acceder a los sensores de movimiento para colocar objetos en tu entorno.">

        <a-camera position="0 1.6 0"></a-camera>

        <!-- un poco de luz simple -->
        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="directional" position="-1 2 1" intensity="0.8"></a-light>

        <!-- el circulito donde se va a colocar el modelo -->
        <a-entity hit-test-handler visible="false">
            <a-ring color="#00ffff" radius-inner="0.1" radius-outer="0.15" rotation="-90 0 0" opacity="0.8"></a-ring>
        </a-entity>

    </a-scene>
</body>

</html>
