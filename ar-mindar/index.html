<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Experiencia AR Sebka</title>
  <meta name="viewport" content="width=device-width,user-scalable=no, initial-scale=0.4,maximum-scale=1" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="ar.js"></script>

</head>

<body>

  <!-- Botón principal, empieza apagado hasta que cargue el vídeo. -->
  <button id="playButton" disabled>Cargando...</button>

  <!-- Botón para cerrar la cámara sin tener que recargar la página -->
  <button id="closeButton" style="display: none;">Cerrar AR</button>

  <!-- Mensaje de ayuda para el usuario -->
  <div id="ar-hint" style="display: none;">📷 Apunta la cámara a la imagen</div>

  <a-scene id="target" mindar-image="imageTargetSrc:Mark/targets.mind;filterMinCF: 0.0001;" embedded
    renderer="colorManagement: true, physicallyCorrectLights, logarithmicDepthBuffer: true;" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false" color-space="sRGB">
    <a-assets>
      <video src="asset.mp4" id="alpha" response-type="arraybuffer" crossorigin renderer="logarithmicDepthBuffer: true;"
        playsinline></video>
    </a-assets>
    <a-entity>
      <a-camera position="0 0 0" scale="0.20 0.20 0.20" look-controls="enabled: false"></a-camera>
      <a-entity id="marker" mindar-image-target="targetIndex: 0">
        <a-plane material="shader: chromakey; src: #alpha; color: 0.1 0.9 0.2" position="0 0 0" scale="2 4 2"></a-plane>
      </a-entity>
    </a-entity>
  </a-scene>

</body>

</html>
