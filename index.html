<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba 3D Sebka</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
</head>
<body>

    <div id="landing">
        <h1>Prueba 3D Sebka</h1>
        <p>Sebka Technology</p>
        <button id="start-btn">Iniciar Experiencia AR</button>
    </div>

    <div id="ar-container" class="hidden">
        <button id="close-btn">✕ Cerrar</button>

        <a-scene id="ar-scene"
            mindar-image="imageTargetSrc: assets/targets.mind; filterMinCF: 0.0001;"
            embedded vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            color-space="sRGB"
            renderer="colorManagement: true; physicallyCorrectLights; logarithmicDepthBuffer: true;">
            <a-assets>
                <video id="ar-video" src="assets/asset.mp4" playsinline crossorigin loop></video>
            </a-assets>
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
            <a-entity id="marker" mindar-image-target="targetIndex: 0">
                <a-plane material="shader: chromakey; src: #ar-video; color: 0.1 0.9 0.2"
                    position="0 0 0" scale="2 4 2"></a-plane>
            </a-entity>
        </a-scene>
    </div>

    <script src="ar.js"></script>
</body>
</html>
