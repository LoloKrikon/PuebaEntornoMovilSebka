<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Prueba 3D Sebka - Experiencia de Realidad Aumentada">
    <title>Prueba 3D Sebka</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- A-Frame + MindAR -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

    <!-- ==================== LANDING PAGE ==================== -->
    <div id="landing">
        <!-- Floating particles -->
        <div class="particles" id="particles"></div>

        <!-- Main title -->
        <div class="title-container">
            <h1>Prueba 3D Sebka</h1>
            <p class="subtitle">Sebka Technology</p>

            <!-- AR Start Button -->
            <button id="start-ar-btn" class="btn-ar" disabled>
                <span class="btn-ar-spinner"></span>
                <span class="btn-ar-text">Cargando modelo...</span>
            </button>
            <p id="loading-status" class="loading-status">Preparando experiencia AR...</p>
        </div>
    </div>

    <!-- ==================== AR EXPERIENCE ==================== -->
    <div id="ar-container" class="ar-container hidden">

        <!-- Overlay controls -->
        <div class="ar-overlay">
            <button id="stop-ar-btn" class="btn-close-ar">✕ Cerrar AR</button>
        </div>

        <!-- Target info -->
        <div id="ar-hint" class="ar-hint">
            <p>📷 Apunta la cámara a la imagen target</p>
        </div>

        <!-- A-Frame Scene -->
        <a-scene
            id="ar-scene"
            mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 1000;"
            color-space="sRGB"
            renderer="colorManagement: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true;"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            embedded
        >
            <!-- Preload assets -->
            <a-assets>
                <a-asset-item id="glb-model" src="assets/model.glb"></a-asset-item>
            </a-assets>

            <!-- Camera -->
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

            <!-- Image target: model appears when target is detected -->
            <a-entity id="marker" mindar-image-target="targetIndex: 0">
                <a-gltf-model
                    id="ar-model"
                    src="#glb-model"
                    position="0 0 0.1"
                    scale="0.1 0.1 0.1"
                    rotation="0 0 0"
                    animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"
                >
                </a-gltf-model>
            </a-entity>
        </a-scene>
    </div>

    <!-- Particles + AR Logic -->
    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (6 + Math.random() * 10) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            particlesContainer.appendChild(p);
        }
    </script>
    <script src="ar.js"></script>

</body>
</html>
